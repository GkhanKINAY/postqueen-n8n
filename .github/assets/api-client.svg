<svg xmlns="http://www.w3.org/2000/svg" width="620" height="508" viewBox="0 0 620 508" role="img" aria-label="API client posting to the PostQueen public API and receiving the scheduled posts response">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f0e1d"/><stop offset="1" stop-color="#171331"/></linearGradient>
  </defs>
  <rect x="1" y="1" width="618" height="506" rx="22" fill="url(#bg)" stroke="#2a2150" stroke-width="1.5"/>
  <!-- request bar -->
  <rect x="24" y="24" width="472" height="44" rx="12" fill="#1b1633" stroke="#2a2150" stroke-width="1"/>
  <text x="44" y="52" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="15" font-weight="700" fill="#f59e0b">POST</text>
  <line x1="98" y1="34" x2="98" y2="58" stroke="#2a2150" stroke-width="1.5"/>
  <text x="112" y="51" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef">api.postqueen.ai/public/v1/posts</text>
  <rect x="508" y="24" width="88" height="44" rx="12" fill="#7c3aed"/>
  <text x="552" y="51" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15.5" font-weight="700" fill="#ffffff">Send</text>
  <!-- tabs -->
  <text x="28" y="98" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8b84b5">Params</text>
  <text x="92" y="98" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#c4b5fd">Authorization</text>
  <text x="192" y="98" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8b84b5">Headers</text>
  <text x="258" y="98" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Body</text>
  <rect x="256" y="104" width="36" height="2.5" rx="1.25" fill="#7c3aed"/>
  <text x="304" y="98" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8b84b5">Tests</text>
  <!-- body json -->
  <rect x="24" y="116" width="572" height="264" rx="12" fill="#141127"/>
  <text x="44" y="146" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef">{</text>
  <text x="60" y="170" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef"><tspan fill="#f59e0b">"type"</tspan>: <tspan fill="#93c5fd">"schedule"</tspan>,</text>
  <text x="60" y="194" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef"><tspan fill="#f59e0b">"date"</tspan>: <tspan fill="#93c5fd">"2026-08-01T09:00:00.000Z"</tspan>,</text>
  <text x="60" y="218" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef"><tspan fill="#f59e0b">"shortLink"</tspan>: <tspan fill="#c084fc">false</tspan>,</text>
  <text x="60" y="242" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef"><tspan fill="#f59e0b">"tags"</tspan>: [],</text>
  <text x="60" y="266" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef"><tspan fill="#f59e0b">"posts"</tspan>: [</text>
  <g opacity="0.5">
    <text x="76" y="290" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef">{ <tspan fill="#f59e0b">"integration"</tspan>: { <tspan fill="#f59e0b">"id"</tspan>: <tspan fill="#93c5fd">"x-id"</tspan> },</text>
    <text x="92" y="314" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef"><tspan fill="#f59e0b">"value"</tspan>: [{ <tspan fill="#f59e0b">"content"</tspan>: <tspan fill="#93c5fd">"Let's go!"</tspan>, <tspan fill="#f59e0b">"image"</tspan>: [] }] },</text>
    <text x="76" y="338" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#c9c2ef">{ <tspan fill="#f59e0b">"integration"</tspan>: { <tspan fill="#f59e0b">"id"</tspan>: <tspan fill="#93c5fd">"linkedin-id"</tspan> }, …</text>
  </g>
  <!-- response toast -->
  <rect x="188" y="296" width="408" height="112" rx="12" fill="#1b1633" stroke="#2a2150" stroke-width="1.5"/>
  <circle cx="212" cy="322" r="7.5" fill="#16a34a"/>
  <path d="M208.5,322 L211.2,324.8 L215.8,319.4" stroke="#ffffff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="228" y="327" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#4ade80">201 Created</text>
  <text x="208" y="354" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13" fill="#c9c2ef">[ { <tspan fill="#f59e0b">"postId"</tspan>: <tspan fill="#93c5fd">"post_01"</tspan>, <tspan fill="#f59e0b">"integration"</tspan>: <tspan fill="#93c5fd">"x-id"</tspan> },</text>
  <text x="222" y="378" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13" fill="#c9c2ef">{ <tspan fill="#f59e0b">"postId"</tspan>: <tspan fill="#93c5fd">"post_02"</tspan>, <tspan fill="#f59e0b">"integration"</tspan>: <tspan fill="#93c5fd">"linkedin-id"</tspan> } ]</text>
  <!-- footer strip -->
  <text x="24" y="442" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15.5" font-weight="700" fill="#ffffff">Automate everything</text>
  <text x="24" y="468" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#9c94c9">The same API drives the CLI, the SDK, the MCP server, n8n,</text>
  <text x="24" y="488" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#9c94c9">Make.com and Zapier.</text>
</svg>
