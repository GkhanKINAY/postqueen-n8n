  <text x="34" y="158" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="13.5" fill="#6f6899"># Claude runs the PostQueen skill</text>
  <text x="34" y="184" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="14.5" fill="#ffffff"><tspan fill="#4ade80">$</tspan> postqueen posts:create \</text>
  <text x="66" y="208" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="14.5" fill="#c4b5fd">-c <tspan fill="#93c5fd">"Launching our new feature today!"</tspan> \</text>
  <text x="66" y="232" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="14.5" fill="#c4b5fd">-s <tspan fill="#93c5fd">"2026-08-01T09:00:00Z"</tspan> \</text>
  <text x="66" y="256" font-family="'SF Mono',SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace" font-size="14.5" fill="#c4b5fd">-i <tspan fill="#93c5fd">"x-id,linkedin-id"</tspan></text>
