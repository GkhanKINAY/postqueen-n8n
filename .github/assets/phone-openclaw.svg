<svg xmlns="http://www.w3.org/2000/svg" width="300" height="560" viewBox="0 0 300 560" role="img" aria-label="OpenClaw on your phone: one message and the posts are scheduled">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f0e1d"/><stop offset="1" stop-color="#171331"/></linearGradient>
  </defs>
  <rect x="2" y="2" width="296" height="556" rx="42" fill="url(#bg)" stroke="#2a2150" stroke-width="3"/>
  <rect x="108" y="16" width="84" height="22" rx="11" fill="#0b0a15"/>
  <!-- chat header -->
  <circle cx="42" cy="74" r="16" fill="#241d45"/>
  <svg viewBox="0 0 120 120" width="26" height="26" x="29" y="61">
  <defs>
    <linearGradient id="lobster-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4d4d"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>
  
  <path d="M60 10 C30 10 15 35 15 55 C15 75 30 95 45 100 L45 110 L55 110 L55 100 C55 100 60 102 65 100 L65 110 L75 110 L75 100 C90 95 105 75 105 55 C105 35 90 10 60 10Z" fill="url(#lobster-gradient)"/>
  
  <path d="M20 45 C5 40 0 50 5 60 C10 70 20 65 25 55 C28 48 25 45 20 45Z" fill="url(#lobster-gradient)"/>
  
  <path d="M100 45 C115 40 120 50 115 60 C110 70 100 65 95 55 C92 48 95 45 100 45Z" fill="url(#lobster-gradient)"/>
  
  <path d="M45 15 Q35 5 30 8" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round"/>
  <path d="M75 15 Q85 5 90 8" stroke="#ff4d4d" stroke-width="3" stroke-linecap="round"/>
  
  <circle cx="45" cy="35" r="6" fill="#050810"/>
  <circle cx="75" cy="35" r="6" fill="#050810"/>
  <circle cx="46" cy="34" r="2.5" fill="#00e5cc"/>
  <circle cx="76" cy="34" r="2.5" fill="#00e5cc"/>

</svg>
  <text x="68" y="70" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="700" fill="#ffffff">OpenClaw</text>
  <text x="68" y="88" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#4ade80">online</text>
  <line x1="20" y1="102" x2="280" y2="102" stroke="#241d45" stroke-width="1"/>
  <!-- user bubble -->
  <rect x="66" y="122" width="212" height="92" rx="15" fill="#5b21b6"/>
  <text x="82" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14.5" fill="#ffffff">Push today&#39;s podcast to</text>
  <text x="82" y="172" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14.5" fill="#ffffff">X and LinkedIn at 5pm</text>
  <text x="82" y="194" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14.5" fill="#ffffff">with the cover art.</text>
  <text x="262" y="206" text-anchor="end" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" fill="#ddd0f7">14:32</text>
  <!-- agent bubble -->
  <rect x="22" y="234" width="224" height="150" rx="15" fill="#211b3f"/>
  <circle cx="44" cy="262" r="7" fill="#16a34a"/>
  <path d="M40.8,262 L43.3,264.6 L47.6,259.6" stroke="#ffffff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="58" y="266" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#4ade80">Done!</text>
  <text x="38" y="294" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#e8e3ff">2 posts scheduled</text>
  <text x="38" y="316" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#e8e3ff">for 5:00 PM today.</text>
  <text x="38" y="344" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#c4b5fd">They are on your</text>
  <text x="38" y="366" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#c4b5fd">calendar for review.</text>
  <!-- second user bubble -->
  <rect x="118" y="404" width="160" height="42" rx="15" fill="#5b21b6"/>
  <text x="134" y="431" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14.5" fill="#ffffff">perfect, thanks!</text>
  <!-- input bar -->
  <rect x="20" y="492" width="216" height="34" rx="17" fill="#1b1633"/>
  <text x="38" y="514" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#6f6899">Message…</text>
  <circle cx="262" cy="509" r="17" fill="#7c3aed"/>
  <path d="M262,502 a4.5,4.5 0 0 1 4.5,4.5 v3 a4.5,4.5 0 0 1 -9,0 v-3 a4.5,4.5 0 0 1 4.5,-4.5 Z M255.5,508 v1.5 a6.5,6.5 0 0 0 13,0 v-1.5 M262,517 v3" stroke="#ffffff" stroke-width="1.7" fill="none" stroke-linecap="round"/>
</svg>
