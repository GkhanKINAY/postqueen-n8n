<svg xmlns="http://www.w3.org/2000/svg" width="620" height="360" viewBox="0 0 620 360" role="img" aria-label="PostQueen analytics: engagement chart, followers, impressions and video views">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f0e1d"/><stop offset="1" stop-color="#171331"/></linearGradient>
    <linearGradient id="engfill" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ec4899" stop-opacity="0.25"/><stop offset="1" stop-color="#ec4899" stop-opacity="0"/></linearGradient>
  </defs>
  <rect x="1" y="1" width="618" height="358" rx="22" fill="url(#bg)" stroke="#2a2150" stroke-width="1.5"/>
  <text x="24" y="40" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff">Analytics</text>
  <text x="596" y="40" text-anchor="end" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="12.5" fill="#8b84b5">Last 30 days</text>
  <!-- big engagement card -->
  <rect x="24" y="56" width="360" height="180" rx="14" fill="#1b1633"/>
  <text x="44" y="86" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#e8e3ff">Posts Engagement</text>
