  <circle cx="296" cy="102" r="4.5" fill="#ec4899" stroke="#ffffff" stroke-width="1.5"/>
  <rect x="252" y="60" width="88" height="34" rx="9" fill="#ffffff"/>
  <text x="296" y="75" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" fill="#6b7280">May 5</text>
  <text x="296" y="89" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#111827">8.4k</text>
