  <text x="416" y="208" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" font-weight="800" fill="#ffffff">6,224</text>
  <path d="M506.0,210.0 L518.0,202.5 L530.0,207.0 L542.0,198.0 L554.0,201.0 L566.0,190.5 L578.0,195.0" fill="none" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom row -->
  <rect x="24" y="252" width="276" height="84" rx="14" fill="#1b1633"/>
  <text x="44" y="276" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8b84b5">Video Views</text>
  <text x="44" y="308" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" font-weight="800" fill="#ffffff">5,678</text>
  <path d="M170.0,298.8 L185.4,290.0 L200.9,296.6 L216.3,272.4 L231.7,294.4 L247.1,287.8 L262.6,292.2 L278.0,285.6" fill="none" stroke="#38bdf8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="316" y="252" width="280" height="84" rx="14" fill="#1b1633"/>
  <text x="336" y="276" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8b84b5">Likes</text>
  <text x="336" y="308" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" font-weight="800" fill="#ffffff">1,982</text>
  <path d="M452.0,301.0 L468.9,294.4 L485.7,287.8 L502.6,292.2 L519.4,283.4 L536.3,276.8 L553.1,279.0 L570.0,272.4" fill="none" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
