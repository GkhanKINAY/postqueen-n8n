  <rect x="400" y="56" width="196" height="84" rx="14" fill="#1b1633"/>
  <text x="416" y="80" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#8b84b5">Followers</text>
  <text x="416" y="112" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="24" font-weight="800" fill="#ffffff">4,144</text>
  <rect x="512" y="94" width="66" height="22" rx="11" fill="#16351f"/>
  <text x="545" y="109" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#4ade80">▲ 12.4%</text>
