  <path d="M44,196 C70,186 90,160 116,166 C142,172 150,140 176,128 C202,116 210,150 236,146 C262,142 270,108 296,102 C322,96 338,116 364,110" fill="none" stroke="#ec4899" stroke-width="2.6" stroke-linecap="round"/>
